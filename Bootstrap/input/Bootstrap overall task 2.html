<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Register</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="C:\Users\admin\.vscode\College Programs\Bootsrap task files\Bootstrap overall task\Bootstrap overall task 4..css">
</head>

<body>

  <div class="container form-container">

    <h1 class="text-center mb-4">Kart Racing Registration</h1>

    <form>

      <div class="mb-3">
        <label class="form-label">Full Name</label>

        <input
          type="text"
          class="form-control"
          placeholder="Enter name"
        >
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>

        <input
          type="email"
          class="form-control"
          placeholder="Enter email"
        >
      </div>

      <div class="mb-3">
        <label class="form-label">Phone Number</label>

        <input
          type="tel"
          class="form-control"
          placeholder="Enter phone"
        >
      </div>

      <div class="mb-3">
        <label class="form-label">Select Kart Type</label>

        <select class="form-select">
          <option>Junior Kart</option>
          <option>Professional Kart</option>
          <option>Speed Kart</option>
        </select>
      </div>

      <button class="btn btn-warning w-100">
        Submit Registration
      </button>

    </form>

  </div>

</body>
</html>
