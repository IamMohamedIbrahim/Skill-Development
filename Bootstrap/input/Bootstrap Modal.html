<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Bootstrap Modal Project</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background: #f4f4f4;
      font-family: Arial, sans-serif;
    }

    .hero-section {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      background: linear-gradient(to right, #0d6efd, #6610f2);
      color: white;
    }

    .hero-section h1 {
      font-size: 3rem;
      font-weight: bold;
    }

    .hero-section p {
      font-size: 1.2rem;
      margin-bottom: 25px;
    }

    .btn-custom {
      padding: 12px 28px;
      font-size: 18px;
      border-radius: 50px;
    }

    .modal-header {
      background-color: #0d6efd;
      color: white;
    }

    .modal-footer button {
      min-width: 100px;
    }
  </style>
</head>

<body>

  <!-- Hero Section -->
  <section class="hero-section">
    <h1>Bootstrap Modal Project</h1>
    <p>Create beautiful popups using Bootstrap 5 Modal Component.</p>

    <!-- Button Trigger Modal -->
    <button
      type="button"
      class="btn btn-light btn-custom"
      data-bs-toggle="modal"
      data-bs-target="#exampleModal"
    >
      Open Modal
    </button>
  </section>

  <!-- Modal -->
  <div
    class="modal fade"
    id="exampleModal"
    tabindex="-1"
    aria-labelledby="exampleModalLabel"
    aria-hidden="true"
  >

    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <!-- Modal Header -->
        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLabel">
            Welcome Message
          </h5>

          <button
            type="button"
            class="btn-close btn-close-white"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>

        <!-- Modal Body -->
        <div class="modal-body">
          <h4>Hello User 👋</h4>

          <p>
            This is a Bootstrap 5 modal popup example.
            You can use modals for login forms, alerts,
            notifications, confirmations, and more.
          </p>

          <!-- Example Form -->
          <form>
            <div class="mb-3">
              <label class="form-label">Email Address</label>

              <input
                type="email"
                class="form-control"
                placeholder="Enter your email"
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>

              <input
                type="password"
                class="form-control"
                placeholder="Enter password"
              />
            </div>
          </form>
        </div>

        <!-- Modal Footer -->
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
          >
            Close
          </button>

          <button type="button" class="btn btn-primary">
            Save Changes
          </button>
        </div>

      </div>
    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
